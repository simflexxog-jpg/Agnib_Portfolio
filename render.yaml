services:
  - type: web
    name: agnib-sikder-portfolio
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: GROQ_API_KEY
        sync: false   # Set this in Render dashboard → Environment → Secret